<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABIYA-MD Device Linking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #38bdf8;
            --primary-amber: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(51, 65, 85, 0.5);
        }

        body { 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            overflow-x: hidden;
        }

        .container { 
            background-color: var(--panel-bg); 
            backdrop-filter: blur(10px);
            padding: 35px 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 25px rgba(56, 189, 248, 0.05); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            transition: all 0.4s ease;
        }

        h1 { 
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0; 
            letter-spacing: 1px;
        }

        .subtitle { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 30px; 
        }

        /* TABS SETUP */
        .tab-container {
            display: flex;
            background-color: rgba(15, 23, 42, 0.6);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .method-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .method-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INPUTS & BUTTONS */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            color: #38bdf8;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            box-sizing: border-box;
            border-radius: 10px; 
            border: 1px solid #475569; 
            background-color: rgba(15, 23, 42, 0.8); 
            color: white; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .action-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, #f59e0b, #d97706);
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2);
        }

        .action-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .action-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* PAIRING CODE BOX */
        .code-box { 
            margin-top: 25px; 
            padding: 18px; 
            background-color: #0f172a; 
            border-radius: 12px; 
            font-size: 28px; 
            letter-spacing: 6px; 
            font-weight: 800; 
            color: #fbbf24; 
            display: none; 
            border: 1px dashed rgba(251, 191, 36, 0.4);
            animation: pulse 2s infinite;
        }

        /* QR CODE DISPLAY BOX */
        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .qr-box {
            padding: 15px;
            background: white;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            min-width: 200px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LOADING SPINNER */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg { 
            margin-top: 20px; 
            color: #10b981; 
            font-size: 14px;
            font-weight: 500;
            display: none; 
            line-height: 1.5;
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BABIYA-MD</h1>
    <div class="subtitle">Select your preferred device linking method</div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('pairing')">Pairing Code</button>
        <button class="tab-btn" onclick="switchTab('qr')">QR Code Scan</button>
    </div>

    <div id="pairingSection" class="method-content active">
        <div class="input-group">
            <label for="phone">WhatsApp Number</label>
            <input type="text" id="phone" placeholder="94712345678" required>
        </div>
        <button id="linkBtn" class="action-btn" onclick="getCode()">GET PAIRING CODE</button>
        <div class="code-box" id="codeBox"></div>
    </div>

    <div id="qrSection" class="method-content">
        <div class="qr-wrapper">
            <div class="qr-box" id="qrcode">
                <div class="spinner" id="qrSpinner"></div>
            </div>
            <button id="qrRefreshBtn" class="action-btn" style="background: linear-gradient(90deg, #38bdf8, #0284c7); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);" onclick="generateQR()">REFRESH QR</button>
        </div>
    </div>

    <div id="status" class="status-msg"></div>
</div>

<script>
    // Tabs මාරු කරන ප්‍රධාන Function එක
    function switchTab(type) {
        const tabs = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.method-content');
        const statusBox = document.getElementById('status');

        statusBox.style.display = "none"; // මාරු වෙද්දී මැසේජ් ක්ලියර් කරන්න

        if(type === 'pairing') {
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
            contents[0].classList.add('active');
            contents[1].classList.remove('active');
        } else {
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
            contents[1].classList.add('active');
            contents[0].classList.remove('active');
            // QR ටැබ් එකට ආපු සැනින්ම QR එක ජෙනරේට් කරන්න ගන්නවා
            generateQR();
        }
    }

    // --- METHOD 1: GET PAIRING CODE ---
    async function getCode() {
        const phone = document.getElementById('phone').value;
        const btn = document.getElementById('linkBtn');
        const codeBox = document.getElementById('codeBox');
        const statusBox = document.getElementById('status');
        
        if(!phone) return alert('Please enter your WhatsApp number!');
        
        btn.innerText = "GENERATING CODE...";
        btn.disabled = true;
        codeBox.style.display = "none";

        try {
            const response = await fetch('/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            });
            const data = await response.json();

            if (data.code) {
                codeBox.innerText = data.code;
                codeBox.style.display = "block";
                btn.style.display = "none";
                
                statusBox.innerText = "👉 Enter this code on your phone's WhatsApp notification. Keep this tab open until session is generated.";
                statusBox.style.color = "#fbbf24";
                statusBox.style.background = "rgba(251, 191, 36, 0.1)";
                statusBox.style.display = "block";
            } else {
                alert('Error: ' + data.error);
                btn.innerText = "GET PAIRING CODE";
                btn.disabled = false;
            }
        } catch (err) {
            alert('Failed to connect to server.');
            btn.innerText = "GET PAIRING CODE";
            btn.disabled = false;
        }
    }

    // --- METHOD 2: GENERATE QR CODE ---
    async function generateQR() {
        const qrContainer = document.getElementById('qrcode');
        const spinner = document.getElementById('qrSpinner');
        const refreshBtn = document.getElementById('qrRefreshBtn');
        const statusBox = document.getElementById('status');

        // Reset QR Box & Show Loader
        qrContainer.innerHTML = "";
        qrContainer.appendChild(spinner);
        spinner.style.display = "block";
        refreshBtn.disabled = true;
        statusBox.style.display = "none";

        try {
            const response = await fetch('/qr');
            const data = await response.json();

            if (data.qr) {
                // Loader එක අයින් කරලා QR එක රෙන්ඩර් කරනවා
                spinner.style.display = "none";
                
                // QRCode.js ලයිබ්‍රරි එකෙන් ලස්සනට QR එක අඳිනවා
                new QRCode(qrContainer, {
                    text: data.qr,
                    width: 200,
                    height: 200,
                    colorDark : "#0f172a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                refreshBtn.disabled = false;
                statusBox.innerText = "📸 Open WhatsApp > Linked Devices > Link a Device and Scan this QR Code.";
                statusBox.style.color = "#38bdf8";
                statusBox.style.background = "rgba(56, 189, 248, 0.1)";
                statusBox.style.display = "block";
            } else {
                qrContainer.innerHTML = "<span style='color:#ef4444; font-size:14px; font-weight:600;'>Failed to get QR. Try again.</span>";
                refreshBtn.disabled = false;
            }
        } catch (err) {
            qrContainer.innerHTML = "<span style='color:#ef4444; font-size:14px; font-weight:600;'>Server Error.</span>";
            refreshBtn.disabled = false;
        }
    }
</script>

</body>
</html>
