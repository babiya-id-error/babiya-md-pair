<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABIYA-MD Pair Code Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #475569;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        button {
            width: 96%;
            padding: 12px;
            background: #0284c7;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0369a1; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px dashed #38bdf8;
            display: none;
        }
        .code {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #4ade80;
        }
        .loading { color: #e2e8f0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>BABIYA-MD CONNECTION</h2>
    <p style="color: #94a3b8; font-size: 14px;">ඇතුළත් කරන්න: 947xxxxxxxx (Country Code එක සමඟ)</p>
    
    <input type="text" id="phoneNumber" placeholder="947xxxxxxxx">
    <button onclick="getPairCode()">Get Pairing Code</button>

    <div id="loadingText" class="loading" style="display: none; margin-top: 15px;">කේතය සකසමින් පවතී, කරුණාකර රැඳී සිටින්න...</div>

    <div id="resultBox" class="result-box">
        <p style="margin: 0 0 10px 0; color: #94a3b8;">ඔබගේ WhatsApp Pairing Code එක:</p>
        <div id="pairCode" class="code">XXXX-XXXX</div>
    </div>
</div>

<script>
    async function getPairCode() {
        const number = document.getElementById('phoneNumber').value;
        const loadingText = document.getElementById('loadingText');
        const resultBox = document.getElementById('resultBox');
        const pairCodeDiv = document.getElementById('pairCode');

        if(!number) return alert('කරුණාකර දුරකථන අංකයක් ඇතුළත් කරන්න!');

        loadingText.style.display = 'block';
        resultBox.style.display = 'none';

        try {
            const response = await fetch(`/code?number=${number}`);
            const data = await response.json();

            loadingText.style.display = 'none';
            if(data.code) {
                pairCodeDiv.innerText = data.code;
                resultBox.style.display = 'block';
            } else {
                alert('කේතය ලබා ගැනීමට අපොහොසත් විය. නැවත උත්සාහ කරන්න.');
            }
        } catch (err) {
            loadingText.style.display = 'none';
            alert('සර්වර් එක සම්බන්ධ කර ගැනීමට නොහැක!');
        }
    }
</script>

</body>
</html>
